<!DOCTYPE html>
<html lang="kr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최종 내역</title>
</head>

<script src="./js/05_final.js"></script>
<link rel="stylesheet" href="./css/05_final.css">

<body>

    <div class="container">
        <div class="stepper">
            <div class="step first active">
                <div class="circle">01</div>
                <div class="label">주문 내역 확인</div>
            </div>

            <div class="step second">
                <div class="circle">02</div>
                <div class="label">적립/할인</div>
            </div>

            <div class="step third">
                <div class="circle">03</div>
                <div class="label">결제수단 선택</div>
            </div>
        </div>

        <!-- 카드 -->
        <div class="card">
            <div class="card-header">매장 주문</div>

            <div class="card-body">
                <h2>주문내역</h2>
                <p class="sub">주문내역을 확인해 주세요</p>

                <div class="table-wrap">
                    <table class="order-table">
                        <thead>
                            <tr>
                                <th>메뉴명</th>
                                <th class="center">수량</th>
                                <th class="center">금액</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="card-tbody">
                                <!-- <td>
                                    <p class="menu">제주말차 단팥 프라페</p>
                                    <p class="option">
                                        잔 옵션 / <span>매장용</span> 컵 / <span>1</span>
                                    </p>
                                </td>
                                <td class="center">1</td>
                                <td class="center">8,500원</td> -->
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="scroll">
                    <div class="button top">
                        <svg width="15" height="10" viewBox="0 0 24 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M2 12L11.4615 2.24045C11.5306 2.16454 11.614 2.10405 11.7066 2.06269C11.7992 2.02134 11.8991 2 12 2C12.1009 2 12.2008 2.02134 12.2934 2.06269C12.386 2.10405 12.4694 2.16454 12.5385 2.24045L22 12"
                                stroke="#000001" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <div class="button bottom">
                        <svg width="15" height="10" viewBox="0 0 24 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M2 2L11.4615 11.7596C11.5306 11.8355 11.614 11.896 11.7066 11.9373C11.7992 11.9787 11.8991 12 12 12C12.1009 12 12.2008 11.9787 12.2934 11.9373C12.386 11.896 12.4694 11.8355 12.5385 11.7596L22 2"
                                stroke="#000001" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>

                <div class="summary">
                    <div>
                        <p>주문 수량</p>
                        <p>할인 금액</p>
                        <p>지불할 금액</p>
                    </div>
                    <div class="right">
                        <p>
                            <span class="totalCnt">0</span> 개
                        </p>
                        <p>
                            <span class="discount">0</span> 원
                        </p>
                        <p>
                            <span class="total">0</span> 원
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 버튼 -->
        <div class="btn-group">
            <button class="btn" id="btnPrev">이전 단계</button>
            <button class="btn primary" id="btnNext">다음 단계</button>
        </div>

        <div class="btn-group small">
            <button class="btn firstPage">
                처음으로
            </button>
            <button class="btn help">
                도움기능
            </button>
        </div>
    </div>

    <!-- 팝업 오버레이 -->
    <div class="overlay">

        <!-- 팝업 -->
        <div class="modal">

            <h2>휴대폰 번호 입력</h2>

            <p class="desc">
                입력한 휴대폰 번호로 전자영수증이 발행되며<br>
                메뉴가 준비되면 <span class="highlight">카카오톡/SMS</span>로 알려드립니다
            </p>

            <!-- 입력 영역 -->
            <div class="phone-box">
                <span class="phone-label">휴대전화 번호</span>
                <span class="phone-value">010-</span>
                <div class="phone-display">
                    <svg width="23" height="15" viewBox="0 0 14 9" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M13.2176 3.83C13.3835 4.01375 13.4753 4.25248 13.4753 4.5C13.4753 4.74752 13.3835 4.98625 13.2176 5.17C12.1676 6.3 9.77764 8.5 6.98764 8.5C4.19764 8.5 1.80764 6.3 0.757639 5.17C0.591799 4.98625 0.5 4.74752 0.5 4.5C0.5 4.25248 0.591799 4.01375 0.757639 3.83C1.80764 2.7 4.19764 0.5 6.98764 0.5C9.77764 0.5 12.1676 2.7 13.2176 3.83Z"
                            stroke="#000001" stroke-linecap="round" stroke-linejoin="round" />
                        <path
                            d="M6.98761 6.5C8.09218 6.5 8.98761 5.60457 8.98761 4.5C8.98761 3.39543 8.09218 2.5 6.98761 2.5C5.88304 2.5 4.98761 3.39543 4.98761 4.5C4.98761 5.60457 5.88304 6.5 6.98761 6.5Z"
                            stroke="#000001" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
            </div>

            <!-- 키패드 -->
            <div class="keypad">
                <button class="btnNum">1</button>
                <button class="btnNum">2</button>
                <button class="btnNum">3</button>
                <button class="btnNum">4</button>
                <button class="btnNum">5</button>
                <button class="btnNum">6</button>
                <button class="btnNum">7</button>
                <button class="btnNum">8</button>
                <button class="btnNum">9</button>

                <button class="dark btnDel">전체 삭제</button>
                <button class="btnNum">0</button>
                <button class="dark btnBack">←</button>
            </div>

            <!-- 동의 -->
            <div class="agree">
                <input type="checkbox" id="agree">
                <label for="agree">개인정보 수집 및 이용 약관에 동의합니다</label>
                <button class="small">약관 보기</button>
            </div>

            <!-- 버튼 -->
            <div class="btn-group">
                <button class="btn outline" id="btnPass">건너뛰기</button>
                <button class="btn primary" id="btnOkay">확인</button>
            </div>

        </div>
    </div>


</body>

</html>
