<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>결제 수단 선택</title>
    <script src="./js/07_finish.js"></script>
    <link rel="stylesheet" href="./css/07_finish.css">
</head>

<body>

    <div class="container">

        <!-- 진행 단계 -->
        <div class="stepper">
            <div class="step first active">
                <div class="circle">
                    <div class="done"></div>
                </div>
                <div class="label">주문 내역 확인</div>
            </div>

            <div class="step second active">
                <div class="circle">
                    <div class="done"></div>
                </div>
                <div class="label">적립/할인</div>
            </div>

            <div class="step third active">
                <div class="circle">03</div>
                <div class="label">결제수단 선택</div>
            </div>
        </div>

        <!-- 제목 -->
        <h1 class="center">결제 수단 선택</h1>
        <p class="subtitle center">결제 수단을 선택해 주세요</p>

        <!-- 금액 정보 -->
        <div class="price-box">
            <div class="summary">
                <div>
                    <p>주문 수량</p>
                    <p>할인 금액</p>
                    <p>지불한 금액</p>
                    <p class="willPay">남은 금액</p>
                </div>
                <div class="right">
                    <p>
                        <span class="totalCnt">0</span> 개
                    </p>
                    <p>
                        <span class="discount">0</span> 원
                    </p>
                    <p>
                        <span class="payed">0</span> 원
                    </p>
                    <p class="willPay">
                        <span class="pay">0</span> 원
                    </p>
                </div>
            </div>
        </div>

        <!-- 버튼 -->
        <div class="button-group">
            <div class="button-two">
                <button id="creditCard">신용카드</button>
                <button id="samsung">삼성페이</button>
            </div>
            <div class="button-two">
                <button id="easy">간편 결제</button>
                <button id="mobileCoupon">모바일 쿠폰</button>
            </div>
            <div class="button-two">
                <button id="membership">멤버십 카드</button>
                <button id="giftCard">기프트 카드</button>
            </div>
            <div class="button-two">
                <button id="payco">페이코</button>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn" id="btnPrev">이전 단계</button>
        </div>

        <div class="btn-group small">
            <button class="btn firstPage">
                처음으로
            </button>
            <button class="btn help">
                도움기능
            </button>
        </div>


        <!-- 팝업 오버레이 -->
        <div class="overlay">

            <!-- 팝업 -->
            <div class="modal">

                <h2 id="modalTitle">제목</h2>

                <p class="modalEx">
                    설명
                </p>

                <div class="modalContent">

                </div>
                
                <!-- 버튼 -->
                <div class="btn-group">
                    <button class="btn outline" id="esc">취소</button>
                </div>

            </div>
        </div>

    </div>

</body>

</html>
