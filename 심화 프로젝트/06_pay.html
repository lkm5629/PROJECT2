<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>적립/할인</title>
    <link rel="stylesheet" href="style.css">
</head>

<script src="./js/06_pay.js"></script>
<link rel="stylesheet" href="./css/06_pay.css">

<body>

    <div class="container">

        <!-- 진행 단계 -->
        <div class="stepper">
            <div class="step first active">
                <div class="circle">
                    <div class="done"></div>
                </div>
                <div class="label">주문 내역 확인</div>
            </div>

            <div class="step second active">
                <div class="circle">02</div>
                <div class="label">적립/할인</div>
            </div>

            <div class="step third">
                <div class="circle">03</div>
                <div class="label">결제수단 선택</div>
            </div>
        </div>

        <!-- 제목 -->
        <h1 class="center">적립/할인</h1>
        <p class="subtitle center">적립 및 할인 수단을 선택해 주세요</p>

        <!-- 금액 정보 -->
        <div class="price-box">
            <div class="summary">
                <div>
                    <p>주문 수량</p>
                    <p>할인 금액</p>
                    <p>지불한 금액</p>
                    <p class="willPay">남은 금액</p>
                </div>
                <div class="right">
                    <p>
                        <span class="totalCnt">0</span> 개
                    </p>
                    <p>
                        <span class="discount">0</span> 원
                    </p>
                    <p>
                        <span class="payed">0</span> 원
                    </p>
                    <p class="willPay">
                        <span class="pay">0</span> 원
                    </p>
                </div>
            </div>
        </div>

        <!-- 버튼 -->
        <div class="button-group">
            <button>T 멤버십 / 우주 혜택 사용</button>
            <button>플러스 쿠폰</button>
        </div>

        <!-- 버튼 -->
        <div class="btn-group">
            <button class="btn" id="btnPrev">이전 단계</button>
            <button class="btn primary" id="btnNext">다음 단계</button>
        </div>

        <div class="btn-group small">
            <button class="btn firstPage">
                처음으로
            </button>
            <button class="btn help">
                도움기능
            </button>
        </div>

    </div>

</body>

</html>
