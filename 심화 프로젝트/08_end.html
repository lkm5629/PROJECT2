<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>주문 완료</title>
    <script src="./js/08_end.js"></script>
    <link rel="stylesheet" href="./css/08_end.css">
</head>

<body>

    <div class="container">

        <div class="top-banner">
            주문이 완료되었습니다!
        </div>

        <div class="title">주문번호</div>
        <div class="order-number">0000</div>

        <div class="divider"></div>

        <div class="receipt-box"></div>

        <div class="desc">
            영수증이 필요하신 경우 영수증 출력 버튼을 눌러주세요
        </div>

        <div class="timer">
            <span class="time">0</span> 초 후 초기화면으로 돌아갑니다
        </div>

        <!-- 버튼 -->
        <div class="btn-group">
            <button class="btn" id="btnPrev">주문번호표만 출력</button>
            <button class="btn primary" id="btnNext">영수증 출력</button>
        </div>

        <div class="btn-group small">
            <button class="btn firstPage">
                처음으로
            </button>
            <button class="btn help">
                도움기능
            </button>
        </div>

    </div>

</body>

</html>
